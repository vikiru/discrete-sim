site_name: Discrete Simulation Project
site_url: https://vikiru.github.io/discrete-sim/docs/
repo_url: https://github.com/vikiru/discrete-sim
repo_name: discrete-sim

nav:
  - Home: index.md
  - Prerequistes and Setup: setup.md
  - Acknowledgements & License: license.md
  - Source Code Reference:
      - Input Modeling: input_modeling.md
      - Inspector: inspector.md
      - Workstation: workstation.md
      - Simulator: simulator.md
      - Alternate Simulator: alternate_simulator.md
  - Using the Project & Understanding the Results:
      - Running the Simulator: usage.md
      - Understanding the Results: results.md

theme:
  name: material
  font:
    text: Roboto
  language: en
  features:
    - search.suggest
    - navigation.tracking
    - navigation.path
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: cyan
      accent: blue
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue
      accent: cyan
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vikiru
copyright: Copyright &copy; 2023 Visakan Kirubakaran

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: false
            show_source: false
